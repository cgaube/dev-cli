name: Release and Update Homebrew

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: "See the [CHANGELOG](CHANGELOG.md) for details."
          draft: false
          prerelease: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: 'cgaube/homebrew-devcommands'
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get new version
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Get release asset URL and SHA256
        id: get_asset
        run: |
          ASSET_URL="https://github.com/cgaube/dev-command/archive/${{ steps.get_version.outputs.VERSION }}.tar.gz"
          SHA256=$(curl -sL $ASSET_URL | sha256sum | cut -d' ' -f1)
          echo "ASSET_URL=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update formula file
        run: |
          # Using sed to update the url and sha256 lines
          # The | separator is used to avoid issues with slashes in the URL
          sed -i "s|url ".*"|url "${{ steps.get_asset.outputs.ASSET_URL }}"|" dev-command.rb
          sed -i "s|sha256 ".*"|sha256 "${{ steps.get_asset.outputs.SHA256 }}"|" dev-command.rb

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dev-command.rb
          git commit -m "Update dev-command to version ${{ steps.get_version.outputs.VERSION }}"
          git push
